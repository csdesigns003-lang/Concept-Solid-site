<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:"Microsoft Sans Serif", Arial;
background:#f5f7fb;
}

</style>

</head>

<body>

<header class="bg-white shadow p-6 flex justify-between">

<a href="index.html" class="text-3xl font-bold">
Concept Solid
</a>

<a href="cart.html">
Cart
</a>

</header>


<section class="max-w-7xl mx-auto px-6 py-20">

<div class="grid md:grid-cols-2 gap-16">


<div>

<img id="main-image" class="rounded-xl shadow mb-6">

<div id="image-gallery" class="grid grid-cols-4 gap-4"></div>

</div>


<div>

<h1 id="product-name" class="text-4xl font-bold mb-4"></h1>

<p id="product-price" class="text-2xl text-blue-700 font-semibold mb-6"></p>

<p id="product-description" class="text-gray-600 mb-10"></p>

<button id="add-cart-btn"
class="w-full bg-blue-700 text-white py-4 text-xl rounded hover:bg-blue-800">

Add to Cart

</button>

</div>

</div>

</section>


<section class="max-w-5xl mx-auto px-6 py-20">

<h2 class="text-3xl font-bold mb-10">
Reviews
</h2>

<div class="border-b pb-6 mb-6">

<p class="font-semibold">
Customer
</p>

<p class="text-gray-600">
Great product.
</p>

</div>

</section>


<script src="js/product-page.js"></script>
<script src="js/cart.js"></script>

</html>
