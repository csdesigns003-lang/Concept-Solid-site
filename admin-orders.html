<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Concept Solid Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:"Microsoft Sans Serif", Arial;
background:#f5f7fb;
}
</style>

</head>

<body>

<header class="bg-white shadow">

<div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

<h1 class="text-2xl font-bold">
Concept Solid Admin
</h1>

<div class="text-sm text-gray-600">
Orders Dashboard
</div>

</div>

</header>


<section class="max-w-7xl mx-auto px-6 py-12">

<!-- Dashboard Stats -->

<div class="grid md:grid-cols-3 gap-6 mb-12">

<div class="bg-white rounded-xl shadow p-6">
<p class="text-gray-500">Today</p>
<h2 id="today-revenue" class="text-2xl font-bold">$0</h2>
</div>

<div class="bg-white rounded-xl shadow p-6">
<p class="text-gray-500">This Month</p>
<h2 id="month-revenue" class="text-2xl font-bold">$0</h2>
</div>

<div class="bg-white rounded-xl shadow p-6">
<p class="text-gray-500">Total Orders</p>
<h2 id="order-count" class="text-2xl font-bold">0</h2>
</div>

</div>


<!-- Orders Table -->

<div class="bg-white rounded-xl shadow overflow-hidden">

<table class="w-full">

<thead class="bg-gray-100">

<tr class="text-left">

<th class="p-4">Order</th>
<th class="p-4">Customer</th>
<th class="p-4">Total</th>
<th class="p-4">Status</th>
<th class="p-4">Actions</th>

</tr>

</thead>

<tbody id="orders-table">

<!-- Orders load here -->

</tbody>

</table>

</div>

</section>


<!-- Order Details Modal -->

<div id="order-modal"
class="fixed inset-0 bg-black/50 hidden items-center justify-center">

<div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-lg">

<div class="flex justify-between items-center mb-6">

<h2 class="text-xl font-bold">
Order Details
</h2>

<button onclick="closeOrderModal()" class="text-gray-500 text-xl">
✕
</button>

</div>

<div id="order-details"></div>

</div>

</div>


<script src="js/admin-orders.js"></script>

<script>

function closeOrderModal(){
document.getElementById("order-modal").classList.add("hidden")
}

</script>


</body>
</html>
