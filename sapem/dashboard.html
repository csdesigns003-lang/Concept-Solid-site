<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SapEM Monitoring Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.card{
background:#1e293b;
border-radius:14px;
padding:20px;
}

.gauge{
width:260px;
height:260px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:44px;
font-weight:bold;
background:conic-gradient(#16a34a 0deg,#16a34a 120deg,#334155 120deg);
}

.rssi-bar{
width:6px;
margin-right:2px;
background:#22c55e;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="bg-slate-900 border-b border-slate-700">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="text-xl font-bold">
SapEM Monitoring System
</h1>

<button onclick="logout()" class="bg-slate-700 px-4 py-2 rounded">
Logout
</button>

</div>

</header>


<div class="max-w-7xl mx-auto p-6 grid md:grid-cols-3 gap-6">

<!-- VACUUM GAUGE -->

<div class="card text-center">

<h2 class="text-lg mb-4">
System Vacuum
</h2>

<div id="vacuumGauge" class="gauge mx-auto">
0
</div>

<p class="text-slate-400 mt-3">
inHg
</p>

</div>


<!-- SYSTEM STATUS -->

<div class="card">

<h2 class="text-lg mb-4">
System Status
</h2>

<div id="systemStats" class="space-y-3 text-sm">

<div>Total Sensors: <span id="sensorCount">0</span></div>

<div>Online Sensors: <span id="onlineCount">0</span></div>

<div>Avg Temperature: <span id="avgTemp">0</span> °C</div>

</div>

</div>


<!-- SENSOR HEALTH -->

<div class="card">

<h2 class="text-lg mb-4">
Sensor Health
</h2>

<div id="sensorHealth"></div>

</div>

</div>



<!-- PRESSURE CHART -->

<div class="max-w-7xl mx-auto p-6">

<div class="card">

<h2 class="text-lg mb-4">
Vacuum Pressure History
</h2>

<canvas id="pressureChart"></canvas>

</div>

</div>


<!-- TEMPERATURE CHART -->

<div class="max-w-7xl mx-auto p-6">

<div class="card">

<h2 class="text-lg mb-4">
Temperature History
</h2>

<canvas id="tempChart"></canvas>

</div>

</div>



<!-- SENSOR TABLE -->

<div class="max-w-7xl mx-auto p-6">

<div class="card">

<h2 class="text-lg mb-4">
Sensor Nodes
</h2>

<table class="w-full text-sm">

<thead class="text-slate-400 border-b border-slate-700">

<tr>

<th class="py-2 text-left">Sensor</th>
<th>Pressure</th>
<th>Temp</th>
<th>Battery</th>
<th>Signal</th>
<th>Status</th>

</tr>

</thead>

<tbody id="sensorTable"></tbody>

</table>

</div>

</div>



<script>

const supabaseClient = supabase.createClient(
"https://odantloiqtucdqoqwjnl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kYW50bG9pcXR1Y2Rxb3F3am5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODc2NjMsImV4cCI6MjA4OTE2MzY2M30._NFnGZ2GlRSPrB37cRn5mVdvCdMe1MuGbI6SPSa44BU"
)

async function logout(){

await supabaseClient.auth.signOut()

window.location.href="login.html"

}

</script>



<script>

const pressureChart = new Chart(
document.getElementById("pressureChart"),
{
type:"line",
data:{
labels:[],
datasets:[{
label:"Vacuum (inHg)",
data:[],
borderColor:"#22c55e",
borderWidth:3
}]
}
})

const tempChart = new Chart(
document.getElementById("tempChart"),
{
type:"line",
data:{
labels:[],
datasets:[{
label:"Temperature °C",
data:[],
borderColor:"#3b82f6",
borderWidth:3
}]
}
})

</script>



<script>

function updateGauge(value){

const gauge = document.getElementById("vacuumGauge")

gauge.innerText = value

const deg = value * 10

gauge.style.background =
`conic-gradient(#16a34a ${deg}deg,#334155 ${deg}deg)`

}

function rssiBars(rssi){

let strength = Math.max(0,Math.min(5,Math.floor((rssi+120)/10)))

let bars=""

for(let i=0;i<5;i++){

bars+=`<div class="rssi-bar" style="height:${(i+1)*6}px;opacity:${i<strength?1:0.2}"></div>`

}

return `<div style="display:flex;align-items:flex-end;height:30px">${bars}</div>`

}

</script>



<script>

async function loadSensors(){

const {data,error} = await supabaseClient
.from("sensors")
.select("*")

if(error) return

const table=document.getElementById("sensorTable")
table.innerHTML=""

let vacuumSum=0
let tempSum=0

data.forEach(sensor=>{

vacuumSum+=sensor.pressure
tempSum+=sensor.temperature

table.innerHTML+=`

<tr class="border-b border-slate-700">

<td class="py-2">${sensor.sensor_name}</td>

<td>${sensor.pressure}</td>

<td>${sensor.temperature}</td>

<td>${sensor.battery}%</td>

<td>${rssiBars(sensor.rssi)}</td>

<td class="text-green-400">Online</td>

</tr>

`

pressureChart.data.labels.push(new Date(sensor.last_update).toLocaleTimeString())
pressureChart.data.datasets[0].data.push(sensor.pressure)

tempChart.data.labels.push(new Date(sensor.last_update).toLocaleTimeString())
tempChart.data.datasets[0].data.push(sensor.temperature)

})

pressureChart.update()
tempChart.update()

updateGauge((vacuumSum/data.length).toFixed(2))

document.getElementById("sensorCount").innerText=data.length
document.getElementById("onlineCount").innerText=data.length
document.getElementById("avgTemp").innerText=(tempSum/data.length).toFixed(1)

}

loadSensors()

</script>



<script>

/* LIVE REALTIME UPDATES */

supabaseClient
.channel("sensor-stream")
.on(
"postgres_changes",
{event:"INSERT",schema:"public",table:"sensors"},
payload=>{

loadSensors()

}
)
.subscribe()

</script>

</body>
</html>
