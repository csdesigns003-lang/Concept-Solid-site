<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SapEM Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:"Microsoft Sans Serif", Arial, sans-serif;
background:#f3f4f6;
}

.hero{
background:linear-gradient(120deg,#004b00,#006400,#228B22);
}

.sensor-card{
transition:.25s;
}

.sensor-card:hover{
transform:translateY(-4px);
box-shadow:0 20px 40px rgba(0,0,0,.12);
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="bg-white shadow sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<div class="flex space-x-8 text-lg">
<a href="products.html" class="hover:text-[#006400]">Products</a>
<a href="resources.html" class="hover:text-[#006400]">Resources</a>
</div>

<a href="index.html" class="text-4xl font-extrabold tracking-tight hover:text-[#006400]">
SapEM Systems
</a>

<div class="flex items-center space-x-8">
<a href="../index.html" class="hover:text-[#006400]">Concept Solid</a>
<a href="devices.html" class="hover:text-[#006400]">Devices</a>

<button onclick="logout()" class="bg-[#006400] text-white px-4 py-2 rounded hover:bg-[#004b00]">
Logout
</button>
</div>

</div>

</header>


<!-- HERO -->

<section class="hero text-white py-20 text-center">

<h1 class="text-5xl font-bold mb-4">
SapEM Monitoring Dashboard
</h1>

<p class="opacity-90">
Live system pressure and sensor status
</p>

</section>


<!-- GAUGE PLACEHOLDER -->

<section class="py-16 text-center">

<h2 class="text-3xl font-bold mb-6">
Average System Pressure
</h2>

<div class="w-72 h-72 mx-auto rounded-full border-4 border-[#006400] flex items-center justify-center bg-white shadow">

<p id="avg-pressure" class="text-3xl font-bold text-[#006400]">
-- PSI
</p>

</div>

</section>


<!-- SENSOR LIST -->

<section class="max-w-6xl mx-auto px-6 pb-20">

<h2 class="text-3xl font-bold mb-10">
Your Sensors
</h2>

<div id="sensor-grid" class="grid md:grid-cols-3 gap-10">

</div>

</section>


<!-- SCRIPTS -->

<script src="js/auth.js"></script>

<script>

async function init(){

// 🔒 Require login
await requireAuth()

// 👤 Get user
const { data: { user } } = await supabase.auth.getUser()

// 📡 Load sensors
const { data: sensors } = await supabase
.from("sensors")
.select("*")
.eq("user_id", user.id)

// 🧮 Calculate average pressure (fake for now)
let pressures = sensors.map(s => s.threshold || 100)

let avg = pressures.length
? Math.round(pressures.reduce((a,b)=>a+b,0)/pressures.length)
: 0

document.getElementById("avg-pressure").innerText = avg + " PSI"


// 📦 Render sensors
const grid = document.getElementById("sensor-grid")
grid.innerHTML = ""

sensors.forEach(sensor => {

grid.innerHTML += `

<div class="sensor-card bg-white p-6 rounded-xl shadow">

<h3 class="text-xl font-bold mb-2">
${sensor.sensor_name}
</h3>

<p class="text-gray-600">
Node ID: ${sensor.node_id}
</p>

<p class="text-gray-600">
Threshold: ${sensor.threshold} PSI
</p>

</div>

`

})

}

init()

</script>


</body>
</html>
