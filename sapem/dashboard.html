<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SapEM Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:"Microsoft Sans Serif", Arial;
background:#f5f7fb;
}

.gauge{
width:250px;
height:250px;
border-radius:50%;
background:conic-gradient(#006400 0deg,#006400 120deg,#ddd 120deg);
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
font-weight:bold;
color:#004b00;
}

</style>

</head>


<body>

<!-- HEADER -->

<header class="bg-white shadow sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">

<h1 class="text-2xl font-bold text-green-800">
SapEM Monitoring
</h1>

<button onclick="logout()"
class="text-sm bg-gray-200 px-4 py-2 rounded-lg">

Logout

</button>

</div>

</header>



<!-- DASHBOARD -->

<section class="max-w-7xl mx-auto px-6 py-12">

<div class="grid md:grid-cols-3 gap-10">

<!-- VACUUM GAUGE -->

<div class="bg-white p-8 rounded-xl shadow text-center">

<h2 class="text-xl font-bold mb-6">
System Vacuum
</h2>

<div id="vacuumGauge" class="gauge">
0
</div>

<p class="mt-4 text-gray-600">
inHg
</p>

</div>


<!-- SENSOR STATUS -->

<div class="bg-white p-8 rounded-xl shadow md:col-span-2">

<h2 class="text-xl font-bold mb-6">
Sensor Status
</h2>

<table class="w-full text-left">

<thead class="border-b">

<tr>

<th class="py-2">Sensor</th>
<th>Pressure</th>
<th>Temperature</th>
<th>Battery</th>
<th>Status</th>

</tr>

</thead>

<tbody id="sensorTable">

</tbody>

</table>

</div>

</div>



<!-- PRESSURE CHART -->

<div class="bg-white p-8 rounded-xl shadow mt-10">

<h2 class="text-xl font-bold mb-6">
Vacuum History
</h2>

<canvas id="pressureChart"></canvas>

</div>



<!-- TEMPERATURE CHART -->

<div class="bg-white p-8 rounded-xl shadow mt-10">

<h2 class="text-xl font-bold mb-6">
Temperature History
</h2>

<canvas id="tempChart"></canvas>

</div>


</section>



<script>

const supabaseClient = supabase.createClient(
"https://odantloiqtucdqoqwjnl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kYW50bG9pcXR1Y2Rxb3F3am5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODc2NjMsImV4cCI6MjA4OTE2MzY2M30._NFnGZ2GlRSPrB37cRn5mVdvCdMe1MuGbI6SPSa44BU"
)

async function checkUser(){

const { data:{user} } = await supabaseClient.auth.getUser()

if(!user){

window.location.href="login.html"

}

}

checkUser()



async function logout(){

await supabaseClient.auth.signOut()

window.location.href="login.html"

}

</script>



<script>

const pressureChart = new Chart(

document.getElementById("pressureChart"),

{

type:"line",

data:{
labels:[],
datasets:[{
label:"Vacuum (inHg)",
data:[],
borderWidth:3
}]
},

options:{
responsive:true
}

})



const tempChart = new Chart(

document.getElementById("tempChart"),

{

type:"line",

data:{
labels:[],
datasets:[{
label:"Temperature (°C)",
data:[],
borderWidth:3
}]
},

options:{
responsive:true
}

})

</script>



<script>

async function loadSensors(){

const {data,error} = await supabaseClient
.from("sensors")
.select("*")

if(error){

console.log(error)

return

}

const table = document.getElementById("sensorTable")

table.innerHTML=""

let vacuumSum = 0
let sensorCount = 0

data.forEach(sensor=>{

vacuumSum += sensor.pressure
sensorCount++

table.innerHTML += `
<tr class="border-b">

<td class="py-2">${sensor.sensor_name}</td>

<td>${sensor.pressure}</td>

<td>${sensor.temperature}</td>

<td>${sensor.battery}%</td>

<td class="text-green-700 font-semibold">Online</td>

</tr>
`

pressureChart.data.labels.push(new Date(sensor.last_update).toLocaleTimeString())
pressureChart.data.datasets[0].data.push(sensor.pressure)

tempChart.data.labels.push(new Date(sensor.last_update).toLocaleTimeString())
tempChart.data.datasets[0].data.push(sensor.temperature)

})

pressureChart.update()
tempChart.update()

const avgVacuum = (vacuumSum/sensorCount).toFixed(2)

updateGauge(avgVacuum)

}



function updateGauge(value){

document.getElementById("vacuumGauge").innerText = value

const deg = value * 10

document.getElementById("vacuumGauge").style.background =
`conic-gradient(#006400 ${deg}deg,#ddd ${deg}deg)`

}



loadSensors()

setInterval(loadSensors,10000)

</script>


</body>
</html>
