<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:"Microsoft Sans Serif", Arial;
background:#f0fdf4;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="bg-white/90 backdrop-blur shadow sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

<!-- LEFT NAV (Desktop) -->
<div class="hidden md:flex space-x-6 text-lg">

<a href="products.html" class="hover:text-[#006400]">
Products
</a>

<a href="resources.html" class="hover:text-[#006400]">
Resources
</a>

</div>


<!-- LOGO -->
<a href="index.html"
class="flex items-center gap-3 hover:opacity-90">

<img src="../images/sapemlogo.png"
class="h-10 md:h-12">

<span class="text-2xl md:text-4xl font-extrabold tracking-tight">
SapEM Systems
</span>

</a>



<!-- RIGHT NAV (Desktop) -->

<div class="hidden md:flex items-center space-x-6">

<a href="../index.html"
class="text-gray-700 hover:text-[#006400]">

Concept Solid

</a>

<a href="login.html"
class="hover:text-[#006400]">

Login

</a>

<a href="../cart.html"
class="font-semibold">

Cart (<span class="cart-count">0</span>)

</a>

</div>


<!-- MOBILE MENU BUTTON -->

<button onclick="toggleMenu()" class="md:hidden text-3xl">

☰

</button>

</div>


<!-- MOBILE DROPDOWN -->

<div id="mobileMenu" class="hidden md:hidden bg-white border-t">

<a href="products.html" class="block px-6 py-4 border-b">
Products
</a>

<a href="resources.html" class="block px-6 py-4 border-b">
Resources
</a>

<a href="../index.html" class="block px-6 py-4 border-b">
Concept Solid
</a>

<a href="login.html" class="block px-6 py-4 border-b">
Login
</a>

<a href="../cart.html" class="block px-6 py-4">
Cart
</a>

</div>

</header>

<section class="max-w-7xl mx-auto px-6 py-20">

<div class="grid md:grid-cols-2 gap-16">


<div>

<img id="main-image" class="rounded-xl shadow mb-6">

<div id="image-gallery" class="grid grid-cols-4 gap-4"></div>

</div>


<div>

<h1 id="product-name" class="text-4xl font-bold mb-4"></h1>

<p id="product-price" class="text-2xl text-green-700 font-semibold mb-6"></p>

<p id="product-description" class="text-gray-600 mb-10"></p>

<button id="add-cart-btn"
class="w-full bg-green-700 text-white py-4 text-xl rounded hover:bg-green-800">

Add to Cart

</button>

</div>

</div>

</section>


<section class="max-w-5xl mx-auto px-6 py-20">

<h2 class="text-3xl font-bold mb-10">
Customer Reviews
</h2>

<div id="reviews-list"></div>

<div class="bg-white shadow rounded-xl p-8 mt-10">

<h3 class="text-xl font-bold mb-4">
Leave a Review
</h3>

<select id="review-rating" class="border p-2 rounded mb-4">

<option value="5">★★★★★</option>
<option value="4">★★★★</option>
<option value="3">★★★</option>
<option value="2">★★</option>
<option value="1">★</option>

</select>

<textarea
id="review-text"
placeholder="Write your review..."
class="w-full border rounded p-3 mb-4">
</textarea>

<button
onclick="submitReview()"
class="bg-green-700 text-white px-6 py-3 rounded hover:bg-green-800">

Submit Review

</button>

</div>

</section>

<script>
function toggleMenu(){
  const menu = document.getElementById("mobileMenu");
  menu.classList.toggle("hidden");
}
</script>

<script src="js/product-page.js"></script>
<script src="js/cart.js"></script>
