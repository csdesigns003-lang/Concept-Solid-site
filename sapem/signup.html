<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create SapEM Account</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow w-96">

<h2 class="text-2xl font-bold mb-6 text-center">
Create Account
</h2>

<input id="email"
type="email"
placeholder="Email"
class="w-full border rounded-lg px-4 py-3 mb-4">

<input id="password"
type="password"
placeholder="Password"
class="w-full border rounded-lg px-4 py-3 mb-6">

<button
onclick="signup()"
class="w-full bg-green-700 text-white py-3 rounded-lg">

Create Account

</button>

<p class="text-center text-sm mt-6">

Already have an account?

<a href="login.html" class="text-green-700 font-semibold">
Login
</a>

</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
"https://odantloiqtucdqoqwjnl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kYW50bG9pcXR1Y2Rxb3F3am5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODc2NjMsImV4cCI6MjA4OTE2MzY2M30._NFnGZ2GlRSPrB37cRn5mVdvCdMe1MuGbI6SPSa44BU"
)

async function signup(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabaseClient.auth.signUp({
email: email,
password: password
})

if(error){

alert(error.message)

}else{

alert("Account created! Please log in.")

window.location.href="login.html"

}

}

</script>

</body>
</html>
