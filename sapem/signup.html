<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Create SapEM Account</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Microsoft Sans Serif, Arial;
background:#f3f4f6;
}

.hero{
background:linear-gradient(120deg,#004b00,#006400,#228B22);
}

</style>

</head>

<body>


<header class="bg-white shadow p-4 text-center font-bold text-2xl">
SapEM Systems
</header>


<section class="hero text-white text-center py-16">

<h1 class="text-5xl font-bold">
Create Account
</h1>

<p class="mt-3">
Register to monitor your SapEM sensors
</p>

</section>


<section class="max-w-md mx-auto bg-white shadow rounded-xl p-10 -mt-12">

<input id="email" placeholder="Email"
class="w-full border p-3 rounded mb-4">

<input id="password" type="password" placeholder="Password"
class="w-full border p-3 rounded mb-6">

<button onclick="signupUser()"
class="w-full bg-[#006400] text-white py-3 rounded hover:bg-[#004b00]">

Create Account

</button>

<p class="text-center mt-4">

Already have an account?

<a href="login.html" class="text-green-700 font-semibold">
Login
</a>

</p>

</section>


<script src="js/auth.js"></script>

<script>

function signupUser(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

signup(email,password)

}

</script>

</body>
</html>
